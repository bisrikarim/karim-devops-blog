{{- if .Params.comments | default .Site.Params.comments }}
<div class="giscus-comments">
  <p class="giscus-label">Comments</p>
  <script src="https://giscus.app/client.js"
    data-repo="karimdevops/karimdevops.github.io"
    data-repo-id="REPLACE_WITH_REPO_ID"
    data-category="Blog Comments"
    data-category-id="REPLACE_WITH_CATEGORY_ID"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="preferred_color_scheme"
    data-lang="en"
    data-loading="lazy"
    crossorigin="anonymous"
    async>
  </script>
  <noscript>
    Please enable JavaScript to view the <a href="https://giscus.app">comments powered by Giscus</a>.
  </noscript>
</div>
{{- end }}
